<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>止痒方案 v5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f0eb;color:#3a3226;max-width:500px;margin:0 auto;padding:20px;line-height:1.7}
h1{font-size:1.4em;color:#8b4513;margin-bottom:5px}
.sub{color:#a0886c;font-size:.85em;margin-bottom:20px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.card h2{font-size:1.1em;color:#6b3a2a;margin-bottom:10px;border-bottom:2px solid #e8d5c4;padding-bottom:6px}
.card p,.card li{margin:6px 0;font-size:.95em}
.card ul,.card ol{padding-left:20px}
.warn{background:#fff8f0;border-left:4px solid #e8a850;padding:12px 16px;border-radius:0 8px 8px 0;margin:12px 0;font-size:.9em}
.footer{text-align:center;color:#b8a088;font-size:.8em;margin-top:30px;padding-top:15px;border-top:1px solid #e8d5c4}
</style>
</head>
<body>
<h1>止痒方案 v5</h1>
<div class="sub">2026年6月更新</div>

<div class="card">
<h2>v4 → v5 变化</h2>
<p>v4用的是通用瘙痒方案。v5换成了专门针对皮肤瘙痒的方案，针对性更强。如果v4已经有效可以继续用，v5作为备选。</p>
</div>

<div class="card">
<h2>使用时间</h2>
<p>感到痒时随时可用，每天1-3次</p>
<p>每次15分钟，不限于固定时间</p>
</div>

<div class="card">
<h2>操作步骤</h2>
<ol>
<li>戴上耳机，音量40-50%</li>
<li>播放「止痒_v5」音频</li>
<li>按压：<b>虎口</b>、<b>手肘外侧横纹尽头</b>、<b>膝盖内上方</b></li>
<li>可同时用冷水毛巾敷在痒处</li>
</ol>
</div>

<div class="warn">
<b>⚠️ 注意</b><br>
· 痒的时候不要抓，按压穴位代替<br>
· 可用马齿苋捣烂外敷<br>
· 炉甘石洗剂涂抹<br>
· 忌辛辣海鲜
</div>

<div class="footer">子午声 · 个人声音方案</div>
</body>
</html>
