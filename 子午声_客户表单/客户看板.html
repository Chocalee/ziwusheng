<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>子午声 · 客户看板</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f4f0;padding:20px;color:#333}
  h1{text-align:center;font-size:22px;color:#5b7a5e;margin-bottom:4px}
  .sub{text-align:center;font-size:12px;color:#999;margin-bottom:20px}
  .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:16px;max-width:1300px;margin:0 auto}
  .client{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
  .client-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .client-name{font-size:17px;font-weight:700}
  .client-badge{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600}
  .badge-lead{background:#f0e8d8;color:#8b7355}
  .badge-analysis{background:#e0e8f8;color:#4a6a9a}
  .badge-paying{background:#f8e8d0;color:#b8860b}
  .badge-active{background:#d8f0d8;color:#3a6a3a}
  .badge-adjusting{background:#e0d8f0;color:#6a4a9a}
  .badge-done{background:#e8e8e8;color:#888}
  .badge-pause{background:#ffe8e0;color:#c06040}
  .client-body{padding:0 16px 12px}
  .stage-row{display:flex;align-items:center;gap:6px;margin:4px 0;font-size:13px}
  .stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dot-done{background:#5b7a5e}.dot-now{background:#e8a84a;box-shadow:0 0 6px #e8a84a}.dot-next{background:#ddd}
  .stage-text{color:#555}.stage-text-done{color:#999;text-decoration:line-through}
  .client-actions{display:flex;gap:6px;padding:10px 16px;background:#fafaf7;border-top:1px solid #eee;font-size:12px;flex-wrap:wrap;align-items:center}
  .action{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap}
  .action-todo{background:#fff3e0;color:#b8860b;border:1px solid #f0d8a0}
  .action-ok{background:#e8f5e8;color:#4a7a50;border:1px solid #b8d8b8}
  .action-warn{background:#ffe8e0;color:#c06040;border:1px solid #f0c0b0}
  .action-overdue{background:#ffe0e0;color:#c03030;border:1px solid #f0b0b0;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .week-label{font-size:11px;color:#aaa;margin-left:auto}
  .schedule{margin:10px 0;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;font-size:10px}
  .sched-week{background:#fafaf7;border-radius:6px;padding:6px;text-align:center;border:1px solid #eee}
  .sched-week.now{background:#e8f5e8;border-color:#b8d8b8}
  .sched-week-label{color:#999;font-size:9px;margin-bottom:2px}
  .sched-week-content{color:#555;font-weight:600}
  .sched-week-date{color:#aaa;font-size:9px}
  .countdown{font-size:10px;padding:2px 6px;border-radius:10px;margin-left:4px}
  .cd-urgent{background:#ffe0e0;color:#c03030}
  .cd-normal{background:#fff8e0;color:#b8860b}
  .cd-ok{background:#e8f5e8;color:#4a7a50}
  @media(max-width:768px){.board{grid-template-columns:1fr}}
  @media print{body{background:#fff}.client{box-shadow:none;border:1px solid #eee;break-inside:avoid}}
</style>
</head>
<body>

<h1>子午声 · 客户看板</h1>
<p class="sub" id="today"></p>
<div class="board" id="board"></div>
<p style="text-align:center;color:#999;font-size:11px;margin-top:20px" id="summary"></p>

<script>
const CLIENTS = [
  {
    name: "李华锋",
    stage: "active",
    startDate: "2026-05-28",
    intakeDone: true, diagnosisDone: true, paid: true,
    audioV: 1, adjustCount: 0,
    notes: "疼痛+睡眠，4贴芬太尼/3天",
    todo: [
      {text:"催记录表回传", type:"todo", due:"2026-06-04"},
      {text:"评估是否减吗啡针", type:"todo", due:"2026-06-05"},
    ]
  },
  {
    name: "李珠峰",
    stage: "active",
    startDate: "2026-05-25",
    intakeDone: true, diagnosisDone: true, paid: true,
    audioV: 2, adjustCount: 1,
    notes: "三叉神经痛+面瘫，第1次调整完成",
    todo: [
      {text:"催记录表回传", type:"todo", due:"2026-06-01"},
    ]
  },
  {
    name: "李庆丰",
    stage: "active",
    startDate: "2026-05-25",
    intakeDone: true, diagnosisDone: true, paid: true,
    audioV: 2, adjustCount: 1,
    notes: "化疗后麻木，胃镜正常后已调整",
    todo: [
      {text:"催记录表回传", type:"todo", due:"2026-06-01"},
    ]
  },
  {
    name: "李巧巧",
    stage: "lead",
    startDate: null,
    intakeDone: false, diagnosisDone: false, paid: false,
    audioV: 0, adjustCount: 0,
    notes: "自己试用：便秘+眼袋+虫咬皮炎（已出音频）",
    todo: [
      {text:"填调研表（可选）", type:"todo", due:null},
    ]
  },
];

const STAGE_LABELS = {
  lead:{label:"咨询中",cls:"badge-lead"}, analysis:{label:"分析中",cls:"badge-analysis"},
  paying:{label:"待付费",cls:"badge-paying"}, active:{label:"调理中",cls:"badge-active"},
  adjusting:{label:"调整中",cls:"badge-adjusting"}, done:{label:"已完成",cls:"badge-done"}, pause:{label:"暂停",cls:"badge-pause"},
};

function getStageIndex(stage, adj){
  if(stage==="lead") return 0; if(stage==="analysis") return 1;
  if(stage==="paying") return 2;
  if(stage==="active" && adj===0) return 3;
  if(adj===1) return 4; if(adj===2) return 5;
  if(stage==="done") return 6; return 3;
}

function daysUntil(dateStr){
  if(!dateStr) return null;
  let d = new Date(dateStr), t = new Date();
  t.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.ceil((d-t)/(1000*60*60*24));
}

function getWeekSchedule(startDate, adjustCount){
  if(!startDate) return null;
  let s = new Date(startDate);
  let weeks = [];
  for(let w=0; w<4; w++){
    let begin = new Date(s); begin.setDate(s.getDate()+w*7);
    let end = new Date(begin); end.setDate(begin.getDate()+6);
    let fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
    let label = w===0?"🎵音频v1":w===1?"🔄调整v2":w===2?"🔄调整v3":"📊总结";
    weeks.push({label, date:`${fmt(begin)}-${fmt(end)}`, now:w===adjustCount});
  }
  return weeks;
}

function render(){
  let today = new Date();
  let todayStr = today.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('today').textContent = todayStr;
  
  let html='', activeCount=0, leadCount=0;
  CLIENTS.forEach(c => {
    let si = getStageIndex(c.stage, c.adjustCount);
    let badge = STAGE_LABELS[c.stage];
    if(c.stage==="active"||c.stage==="adjusting") activeCount++;
    if(c.stage==="lead") leadCount++;
    
    let stagesHtml = '';
    ["📋调研","🔍诊断","💳付费","🎵v1","🔄v2","🔄v3","✅收尾"].forEach((s,i)=>{
      let cls = i<si?"dot-done":(i===si?"dot-now":"dot-next");
      let txtCls = i<si?"stage-text-done":"stage-text";
      stagesHtml += `<div class="stage-row"><div class="stage-dot ${cls}"></div><span class="${txtCls}">${s}</span></div>`;
    });
    
    let actionsHtml = '';
    c.todo.forEach(t => {
      let days = daysUntil(t.due);
      let cls = "action-todo";
      let suffix = '';
      if(days !== null){
        if(days < 0){ cls="action-overdue"; suffix=`<span class="countdown cd-urgent">超${Math.abs(days)}天!</span>`; }
        else if(days <= 2){ cls="action-warn"; suffix=`<span class="countdown cd-urgent">${days}天后</span>`; }
        else if(days <= 5){ suffix=`<span class="countdown cd-normal">${days}天后</span>`; }
        else { suffix=`<span class="countdown cd-ok">${days}天后</span>`; }
      }
      let dueStr = t.due ? ` · ${t.due}` : '';
      actionsHtml += `<span class="action ${cls}">${t.text}${dueStr}${suffix}</span>`;
    });
    
    // Week schedule
    let schedule = getWeekSchedule(c.startDate, c.adjustCount);
    let schedHtml = '';
    if(schedule){
      schedHtml = '<div class="schedule">';
      schedule.forEach(w => {
        let nowCls = w.now ? "now" : "";
        schedHtml += `<div class="sched-week ${nowCls}"><div class="sched-week-label">${w.label}</div><div class="sched-week-content">${w.now?'📍当前':''}</div><div class="sched-week-date">${w.date}</div></div>`;
      });
      schedHtml += '</div>';
    }
    
    html += `
    <div class="client">
      <div class="client-header">
        <span class="client-name">${c.name}</span>
        <span class="client-badge ${badge.cls}">${badge.label}</span>
      </div>
      <div class="client-body">
        ${stagesHtml}
        ${c.notes?`<p style="font-size:11px;color:#999;margin:6px 0">📝 ${c.notes}</p>`:''}
        ${schedHtml}
      </div>
      <div class="client-actions">${actionsHtml}</div>
    </div>`;
  });
  
  document.getElementById('board').innerHTML = html;
  document.getElementById('summary').textContent = `🔥调理中:${activeCount} | 📋咨询中:${leadCount} | 共${CLIENTS.length}位客户`;
}

render();
</script>
</body></html>
