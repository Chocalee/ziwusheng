<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>李华锋 · 周记录表 v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f0eb;color:#3a3226;max-width:100vw;padding:10px;line-height:1.5;overflow-x:auto}
h1{font-size:1.2em;color:#8b4513;text-align:center;margin:8px 0}
.week-nav{display:flex;justify-content:space-between;align-items:center;margin:10px 0;gap:8px}
.week-nav button{background:#8b4513;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:.85em;cursor:pointer}
.week-nav span{font-weight:bold;color:#6b3a2a}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;font-size:.75em;table-layout:fixed}
th{background:#e8d5c4;padding:8px 2px;text-align:center;color:#6b3a2a;font-weight:bold;position:sticky;top:0}
td{padding:4px 1px;text-align:center;border-bottom:1px solid #f0e8dd}
td:first-child{font-weight:bold;color:#8b4513;font-size:.8em}
input,select{width:100%;border:1px solid #e0d5c5;border-radius:6px;padding:6px 2px;font-size:.8em;background:#fafaf5;text-align:center;min-width:0}
input:focus,select:focus{outline:none;border-color:#8b4513}
.btn-row{text-align:center;margin:14px 0}
.btn{background:#8b4513;color:#fff;border:none;padding:12px 36px;font-size:1em;border-radius:10px;cursor:pointer}
.footer{text-align:center;color:#b8a088;font-size:.7em;margin-top:10px}
</style>
</head>
<body>
<h1>周记录表 v3</h1>
<div class="week-nav">
<button onclick="prevWeek()">◀ 上周</button>
<span id="weekLabel"></span>
<button onclick="nextWeek()">▶ 下周</button>
<button onclick="goToday()">本周</button>
</div>

<table id="table">
<thead><tr><th>日期</th><th>疼痛<br>0-10</th><th>出汗</th><th>大便</th><th>睡眠<br>h</th><th>吗啡贴</th><th>备注</th></tr></thead>
<tbody></tbody>
</table>

<div class="btn-row"><button class="btn" onclick="save()">保存本周</button></div>
<div class="footer" id="status"></div>

<script>
const KEY='huafeng_week_logs';
let logs=JSON.parse(localStorage.getItem(KEY)||'{}');
let currentMonday=getMonday(new Date());

function getMonday(d){const dt=new Date(d);dt.setHours(0,0,0,0);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);return dt.toISOString().slice(0,10);}

function weekLabel(){const d=new Date(currentMonday);const sun=new Date(d);sun.setDate(d.getDate()+6);return d.toISOString().slice(0,10)+' ~ '+sun.toISOString().slice(0,10);}

function getDays(){
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(currentMonday);d.setDate(d.getDate()+i);days.push(d.toISOString().slice(0,10));}
  return days;
}

function render(){
  document.getElementById('weekLabel').textContent=weekLabel();
  const days=getDays();
  const weekData=logs[currentMonday]||{};
  let tbody='';
  days.forEach(date=>{
    const d=weekData[date]||{};
    const short=date.slice(5);
    tbody+=`<tr>
<td>${short}</td>
<td><input id="p_${date}" type="number" min="0" max="10" value="${d.pain||''}" placeholder="-"></td>
<td><select id="s_${date}"><option value="">-</option><option ${d.sweat==='无'?'selected':''}>无</option><option ${d.sweat==='轻微'?'selected':''}>轻微</option><option ${d.sweat==='湿透'?'selected':''}>湿透</option></select></td>
<td><select id="b_${date}"><option value="">-</option><option ${d.stool==='无'?'selected':''}>无</option><option ${d.stool==='有'?'selected':''}>有</option></select></td>
<td><input id="sl_${date}" type="text" value="${d.sleep||''}" placeholder="h"></td>
<td><select id="m_${date}"><option value="">-</option><option ${d.morphine==='正常'?'selected':''}>正常</option><option ${d.morphine==='减量'?'selected':''}>减量</option><option ${d.morphine==='增补'?'selected':''}>增补</option></select></td>
<td><input id="n_${date}" type="text" value="${d.note||''}" placeholder="..."></td>
</tr>`;
  });
  document.querySelector('tbody').innerHTML=tbody;
}

function save(){
  const days=getDays();
  const weekData={};
  days.forEach(date=>{
    weekData[date]={
      pain:document.getElementById('p_'+date)?.value||'',
      sweat:document.getElementById('s_'+date)?.value||'',
      stool:document.getElementById('b_'+date)?.value||'',
      sleep:document.getElementById('sl_'+date)?.value||'',
      morphine:document.getElementById('m_'+date)?.value||'',
      note:document.getElementById('n_'+date)?.value||''
    };
  });
  logs[currentMonday]=weekData;
  localStorage.setItem(KEY,JSON.stringify(logs));
  document.getElementById('status').textContent='✓ 已保存 '+new Date().toLocaleTimeString();
}

function prevWeek(){const d=new Date(currentMonday);d.setDate(d.getDate()-7);currentMonday=d.toISOString().slice(0,10);render();}
function nextWeek(){const d=new Date(currentMonday);d.setDate(d.getDate()+7);currentMonday=d.toISOString().slice(0,10);render();}
function goToday(){currentMonday=getMonday(new Date());render();}

render();
</script>
</body>
</html>
